<body>

    <!-- NAVBAR -->
    <nav>

        <div class="logo">
            <img src="TS-logo.jpg" alt="Logo da TechSpace">

        <ul id="menu">
            <li><a href="index.html">Início</a></li>

            <li class="dropdown">

    <!-- HERO CONTATO -->
    <section class="contact-hero">

        <h1>Entre em Contato</h1>
        <p>Fale com nossa equipe para solicitar um orçamento ou tirar suas dúvidas.</p>

    </section>


    <!-- SEÇÃO CONTATO -->
    <section class="contact-section">

        <div class="contact-container">

            <!-- FORMULÁRIO -->
            <div class="contact-form">

                <label>Nome completo</label>
                <input type="text" id="nome" placeholder="Seu nome">

                <label>Empresa</label>
                <input type="text" id="empresa" placeholder="Nome da empresa">

                <label>Email</label>
                <input type="email" id="email" placeholder="seuemail@email.com">

                <label>Telefone</label>
                <input type="text" id="telefone" placeholder="Inclua o código do país">

                <label>Área de interesse</label>
                <select id="area">
                    <option>—Escolha uma opção—</option>
                    <option>Criação de Sites</option>
                    <option>Loja Virtual</option>
                    <option>Manutenção de Sites</option>
                </select>

                <label>Mensagem</label>
                <textarea id="mensagem" placeholder="Digite sua mensagem ou dúvida aqui..."></textarea>

                <button class="form-btn" id="enviarBtn">Enviar Mensagem</button>

            </div>


            <!-- MAPA -->
            <div class="map">

                    src="https://maps.google.com/maps?q=Sao%20Bernardo%20do%20Campo%20Sao%20Paulo%20Brasil&t=&z=13&ie=UTF8&iwloc=&output=embed"

        </div>

    </section>

    <!-- FOOTER -->
    <footer>
